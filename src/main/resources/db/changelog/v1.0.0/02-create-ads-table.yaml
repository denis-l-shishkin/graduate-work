databaseChangeLog:
  - changeSet:
      id: 2026-03-01-02-create-ads-table
      author: dshishkin
      comment: Создание таблицы ads
      changes:
        - createTable:
            tableName: ads
            columns:
              - column:
                  name: pk
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: image_path
                  type: VARCHAR(255)
              - column:
                  name: author_id
                  type: INTEGER
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: ads
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_ads_author
            onDelete: CASCADE
      rollback:
        - dropTable:
            tableName: ads