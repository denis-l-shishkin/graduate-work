databaseChangeLog:
  - changeSet:
      id: 2026-03-01-03-create-comments-table
      author: dshishkin
      comment: Создание таблицы comments
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: pk
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: text
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: ad_id
                  type: INTEGER
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: comments
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_comments_author
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: comments
            baseColumnNames: ad_id
            referencedTableName: ads
            referencedColumnNames: pk
            constraintName: fk_comments_ad
            onDelete: CASCADE
      rollback:
        - dropTable:
            tableName: comments