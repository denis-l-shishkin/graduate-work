databaseChangeLog:
  - changeSet:
      id: 2026-03-01-01-create-users-table
      author: dshishkin
      comment: Создание таблицы users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: image_path
                  type: VARCHAR(255)
      rollback:
        - dropTable:
            tableName: users